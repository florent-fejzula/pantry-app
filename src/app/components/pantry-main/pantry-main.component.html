<div class="pantry">
  <header class="pantry-header">
    <div class="title-row">
      <h2 class="title">🥗 Pantry</h2>

      <div class="header-search" [class.open]="searchOpen()">
        <input
          type="text"
          class="search-input"
          [formControl]="search"
          placeholder="Search pantry..."
          aria-label="Search pantry"
        />

        <button
          type="button"
          class="search-toggle"
          (click)="toggleSearch()"
          [attr.aria-label]="searchOpen() ? 'Close search' : 'Open search'"
        >
          {{ searchOpen() ? "✕" : "🔍" }}
        </button>
      </div>
    </div>

    <div class="quick-add">
      <input
        type="text"
        [formControl]="newName"
        placeholder="Add item (e.g. Eggs, Milk, Chicken)..."
        aria-label="New item name"
        (keyup.enter)="addQuick()"
      />

      <button type="button" class="add-btn" (click)="addQuick()">Add</button>

      <div class="category-meta">
        <span class="adding-to-label">Adding to</span>
        <span class="selected-chip">{{ selectedCategory() }}</span>
      </div>

      <div class="cats">
        <button
          *ngFor="let c of categories"
          type="button"
          class="chip"
          [class.active]="c === selectedCategory()"
          (click)="selectCategory(c)"
        >
          {{ c }}
        </button>
      </div>
    </div>
  </header>

  <section class="groups" *ngIf="filteredGrouped$ | async as groups">
    <div *ngIf="!groups.length" class="empty">
      No items yet. Add something above ↑
    </div>

    <div class="group" *ngFor="let g of groups">
      <h3 class="group-title">{{ g.category }}</h3>

      <ul class="list">
        <li class="row" *ngFor="let it of g.items; trackBy: trackById">
          <ng-container *ngIf="editingId() !== it.id; else editRow">
            <span class="name" (click)="startEdit(it)" title="Click to edit">
              {{ it.name }}
            </span>
            <button
              class="x"
              type="button"
              title="Delete"
              (click)="remove(it.id)"
            >
              ×
            </button>
          </ng-container>

          <ng-template #editRow>
            <div class="edit-wrap">
              <input
                class="edit-name"
                type="text"
                [formControl]="editName"
                (keyup.enter)="saveEdit(it.id)"
              />

              <div class="edit-actions">
                <select class="edit-cat" [formControl]="editCategory">
                  <option *ngFor="let c of categories" [value]="c">
                    {{ c }}
                  </option>
                </select>

                <button
                  type="button"
                  class="btn save"
                  (click)="saveEdit(it.id)"
                >
                  Save
                </button>

                <button type="button" class="btn cancel" (click)="cancelEdit()">
                  Cancel
                </button>
              </div>
            </div>
          </ng-template>
        </li>
      </ul>
    </div>
  </section>
</div>
