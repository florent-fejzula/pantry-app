<div class="ideas-page">
  <header class="ideas-header">
    <div class="title-row">
      <h2 class="title">✨ Ideas</h2>
    </div>

    <div class="prompt-card">
      <label class="section-label" for="ideas-prompt">
        What do you feel like?
      </label>

      <textarea
        id="ideas-prompt"
        [formControl]="prompt"
        rows="3"
        placeholder='e.g. "light dinner, no frying, Turkish/Levant vibe."'
        aria-label="Prompt"
      ></textarea>
    </div>
  </header>

  <section class="filters-card">
    <div class="filter-block">
      <div class="filter-label">How many ideas?</div>
      <div class="segmented">
        <button
          type="button"
          *ngFor="let count of ideaCountOptions"
          [class.active]="ideaCount() === count"
          (click)="ideaCount.set(count)"
        >
          {{ count }}
        </button>
      </div>
    </div>

    <div class="filter-block">
      <div class="filter-label">Max missing</div>
      <div class="segmented">
        <button
          type="button"
          [class.active]="maxMissing() === 0"
          (click)="maxMissing.set(0)"
        >
          0
        </button>
        <button
          type="button"
          [class.active]="maxMissing() === 1"
          (click)="maxMissing.set(1)"
        >
          1
        </button>
        <button
          type="button"
          [class.active]="maxMissing() === 2"
          (click)="maxMissing.set(2)"
        >
          2
        </button>
      </div>
    </div>

    <div class="filter-block">
      <div class="filter-label">Time</div>
      <div class="chips">
        <button
          type="button"
          *ngFor="let t of [10, 15, 20, 30, 45, 60]"
          [class.active]="time() === t"
          (click)="time.set(t)"
        >
          {{ t }}′
        </button>

        <button
          type="button"
          [class.active]="time() === null"
          (click)="time.set(null)"
        >
          Any
        </button>
      </div>
    </div>

    <div class="filter-block">
      <div class="filter-label">Cuisines</div>

      <div class="chips">
        <button
          type="button"
          *ngFor="let c of predefinedCuisines"
          [class.active]="hasCuisine(c)"
          (click)="toggleCuisine(c)"
        >
          {{ c }}
        </button>
      </div>

      <div class="custom-input-row">
        <input
          type="text"
          [formControl]="customCuisineInput"
          placeholder="Add any cuisine or style (e.g. Greek, Persian, Ottoman...)"
          (keyup.enter)="addCustomCuisineFromInput()"
        />

        <button
          type="button"
          class="set-btn"
          (click)="addCustomCuisineFromInput()"
        >
          Add
        </button>
      </div>

      <div *ngIf="cuisines().length" class="selected-list">
        <div *ngFor="let c of cuisines()" class="picked-chip">
          <span>{{ c }}</span>
          <button
            type="button"
            class="clear-btn"
            title="Remove"
            (click)="removeCuisine(c)"
          >
            ×
          </button>
        </div>
      </div>
    </div>

    <div class="filter-block">
      <div class="filter-label">Recipe type</div>

      <label class="option-card">
        <input
          #realRecipesToggle
          type="checkbox"
          [checked]="preferRealRecipes()"
          (change)="preferRealRecipes.set(realRecipesToggle.checked)"
        />

        <div class="option-copy">
          <div class="option-title">Prefer real existing recipes</div>
          <div class="option-hint">
            Try to return proper named dishes like Aglio e Olio, Menemen,
            Tufahija, Yayla Çorbası, Melanzane alla Parmigiana…
          </div>
        </div>
      </label>
    </div>

    <div class="filter-block">
      <div class="filter-label">Star ingredient</div>

      <div class="star-wrap">
        <div class="star-input-row">
          <input
            type="text"
            list="pantry-suggestions"
            [formControl]="starInput"
            placeholder="type to select (e.g. bulgur, chicken, yogurt)..."
            (keyup.enter)="setStarFromInput()"
          />

          <button type="button" class="set-btn" (click)="setStarFromInput()">
            Set
          </button>
        </div>

        <datalist id="pantry-suggestions">
          <option *ngFor="let n of pantryNames$ | async" [value]="n"></option>
        </datalist>

        <div *ngIf="starIngredient()" class="picked-chip">
          <span>{{ starIngredient() }}</span>
          <button
            type="button"
            class="clear-btn"
            title="Remove"
            (click)="clearStar()"
          >
            ×
          </button>
        </div>
      </div>
    </div>

    <div class="generate-row">
      <button
        type="button"
        class="generate-btn"
        (click)="generate()"
        [disabled]="loading()"
      >
        {{ loading() ? "Generating..." : "Generate ideas" }}
      </button>

      <div *ngIf="error()" class="error-text">
        {{ error() }}
      </div>
    </div>
  </section>

  <app-results
    id="results"
    [ideas]="(ideas$ | async) ?? []"
    [generatedOnce]="generatedOnce()"
  ></app-results>
</div>
